<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Successful</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page-container">
    <div class="page-box">
      <h2>Thank You For Your Purchase!</h2>
      <p>Your payment was successful. You can now download your product below.</p>

      <!-- DOWNLOAD BUTTON -->
      <a href="YOUR_DIGITAL_PRODUCT_FILE_HERE" class="btn btn-primary" download>
        Download Product
      </a>
    </div>
  </div>

  <script>
    // --- BLOCK ACCESS IF USER DID NOT PAY ---
    if (localStorage.getItem("paid") !== "true") {
      window.location.href = "index.html";
    }

    // Clear flag so they can't refresh to download again
    localStorage.removeItem("paid");
  </script>

</body>
</html>
